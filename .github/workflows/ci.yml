name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests (macOS 15, Xcode 16.2)
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

    steps:
      - name: Checkout
        # actions/checkout v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Verify Xcode 16.2
        run: |
          set -euo pipefail
          [[ "$(xcodebuild -version | sed -n '1s/^Xcode //p')" == "16.2" ]]

      - name: Check shell syntax
        run: /bin/bash -n Scripts/*.sh Scripts/lib/*.sh

      - name: Run SOP safety tests
        run: ./Scripts/test-sop.sh

      - name: Verify iTerm handoff generated resource
        run: ./Scripts/verify-iterm-handoff.sh

      - name: Test GitHub release contract
        run: ./Scripts/test-github-release.sh

      # We intentionally call xcodebuild directly instead of Scripts/test.sh.
      #
      # Scripts/test.sh is written for a real developer Mac: it acquires a
      # cross-process operation lock, cleans global Launch Services
      # registrations, and enforces developer-machine invariants. CI invokes
      # its headless-safe gates separately. The command below is the same
      # Core plus test-bundle build, with warnings promoted to errors.
      - name: Run unit tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Go2Codex.xcodeproj \
            -scheme Go2CodexUnitTests \
            -configuration Debug \
            -destination 'platform=macOS' \
            -resultBundlePath "$RUNNER_TEMP/test-results.xcresult" \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Build and verify Release product
        run: |
          set -euo pipefail
          ./Scripts/package-github-release.sh --verify-build-only
          for path in \
            .build/github-release-derived \
            .build/github-release-package \
            .build/github-release-verification \
            .build/github-release.log \
            dist; do
            [[ ! -e "$path" && ! -L "$path" ]]
          done
          [[ ! -s "$GITHUB_OUTPUT" ]]
