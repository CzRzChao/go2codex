name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Unit tests (macOS 14, Xcode 16.2)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin Xcode 16.2 (Swift 6.0) to match the project's supported toolchain.
      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Verify iTerm handoff generated resource
        run: ./Scripts/verify-iterm-handoff.sh

      # We intentionally call xcodebuild directly instead of Scripts/test.sh.
      #
      # Scripts/test.sh is written for a real developer Mac: it acquires a
      # cross-process operation lock, mutates global Launch Services
      # registrations (lsregister), runs the SOP self-tests, and enforces
      # developer-machine invariants. Those side effects are fragile and
      # inappropriate on an ephemeral headless runner. The command below is
      # exactly the unit-test invocation that test.sh runs internally
      # (scheme Go2CodexUnitTests, Debug, platform=macOS), which builds only
      # Core plus the test bundle and produces no app product.
      - name: Run unit tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Go2Codex.xcodeproj \
            -scheme Go2CodexUnitTests \
            -configuration Debug \
            -destination 'platform=macOS' \
            -resultBundlePath "$RUNNER_TEMP/test-results.xcresult"
