name: GitHub Preview Release

on:
  push:
    tags:
      - "v*-preview.*"

permissions:
  contents: write

concurrency:
  group: github-preview-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish unsigned preview
    # macOS 15 arm64 still provides Xcode 16.2, while the macOS 14 runner is being retired.
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

    steps:
      - name: Checkout tagged commit
        # actions/checkout v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Xcode 16.2
        run: |
          set -euo pipefail
          [[ "$(xcodebuild -version | sed -n '1s/^Xcode //p')" == "16.2" ]]

      - name: Verify tagged commit is on main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Check shell syntax
        run: /bin/bash -n Scripts/*.sh Scripts/lib/*.sh

      - name: Run SOP safety tests
        run: ./Scripts/test-sop.sh

      - name: Test GitHub release contract
        run: ./Scripts/test-github-release.sh

      - name: Verify iTerm handoff generated resource
        run: ./Scripts/verify-iterm-handoff.sh

      - name: Run unit tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Go2Codex.xcodeproj \
            -scheme Go2CodexUnitTests \
            -configuration Debug \
            -destination 'platform=macOS' \
            -resultBundlePath "$RUNNER_TEMP/test-results.xcresult" \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Build and verify preview archive
        id: package
        run: ./Scripts/package-github-release.sh "$GITHUB_REF_NAME"

      - name: Publish GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_WARNING: |
            > [!WARNING]
            > This is an ad-hoc-signed, non-notarized preview build. macOS will block the first launch until the user explicitly chooses Open Anyway in System Settings > Privacy & Security. Only install it if you trust this repository and have verified the published SHA-256 checksum.
        run: |
          set -euo pipefail
          remote_main_ref="refs/github-release/remote-main"
          remote_tag_ref="refs/github-release/remote-tag"
          git fetch --no-tags --force origin \
            "refs/heads/main:${remote_main_ref}" \
            "refs/tags/${GITHUB_REF_NAME}:${remote_tag_ref}"
          event_commit="$(git rev-parse --verify "${GITHUB_SHA}^{commit}")"
          remote_tag_commit="$(git rev-parse --verify "${remote_tag_ref}^{commit}")"
          [[ "$remote_tag_commit" == "$event_commit" ]] || {
            echo "Remote tag moved after this workflow started; refusing to publish." >&2
            exit 1
          }
          git merge-base --is-ancestor "$remote_tag_commit" "$remote_main_ref" || {
            echo "Tagged commit is no longer reachable from main; refusing to publish." >&2
            exit 1
          }
          gh release create "${{ steps.package.outputs.release_tag }}" \
            "${{ steps.package.outputs.archive_path }}#Go2Codex unsigned preview for Apple Silicon" \
            "${{ steps.package.outputs.checksum_path }}#SHA-256 checksum" \
            --verify-tag \
            --prerelease \
            --latest=false \
            --title "Go2Codex ${{ steps.package.outputs.release_version }} (unsigned preview)" \
            --notes "$RELEASE_WARNING" \
            --generate-notes
